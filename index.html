<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的个人港湾</title>
    <!-- 引入 Google 字体以提升排版美感 -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- ga 存根：防止 AquaInkGL 脚本调用未定义的 Google Analytics 函数导致崩溃 -->
    <script>window.ga = window.ga || function () { };</script>
    <!-- AquaInkGL 依赖库 -->
    <script src="./assets/dat.gui.min.js"></script>

    <style>
        :root {
            --primary-accent: #a3c9e2;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            /* 防止划拉屏幕时选中文字影响体验 */
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            /* 去除移动端点击高亮 */
        }

        html,
        body {
            overflow: hidden;
            background-color: #000;
            height: 100%;
        }

        body {
            position: fixed;
            width: 100%;
            font-family: 'Poppins', 'Noto Serif SC', sans-serif;
            color: var(--text-color);
        }

        /* 水墨画 WebGL 画布 */
        canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            z-index: 0;
            cursor: crosshair;
        }

        /* 界面外壳容器：禁止拦截事件，使水墨特效可以在空白处涂抹 */
        .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            /* 穿透鼠标事件给底下画布 */
        }

        /* 核心港湾卡片：毛玻璃效果 */
        .harbor-card {
            pointer-events: auto;
            /* 允许卡片内部响应点击 */
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease, background 0.3s;
            animation: fadeIn 1.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .harbor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.2);
        }

        /* 头像容器 */
        .avatar-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .avatar-wrapper:hover {
            transform: scale(1.03) rotate(2deg);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .meta-info {
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
            backdrop-filter: blur(5px);
        }

        p.slogan {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 35px;
            line-height: 1.8;
            font-weight: 300;
            font-style: italic;
        }

        /* 导航/分类按钮 */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #fff;
            font-size: 14px;
            padding: 10px 24px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            font-weight: 400;
            letter-spacing: 1px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 右下角提示文案 (可选) */
        .hint-text {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            font-weight: 300;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <!-- 水墨画画布 -->
    <canvas></canvas>

    <!-- 主体内容卡片层容器 -->
    <div class="content-wrapper">
        <div class="harbor-card">
            <div class="avatar-wrapper">
                <!-- 你的 PNG 照片，已改名为 avatar.png -->
                <img src="./avatar.png" alt="我的头像" class="avatar">
            </div>

            <div class="user-info">
                <h1>你的名字 / 昵称</h1>
                <!-- 出生年月标签 -->
                <div class="meta-info">Since 2002.05</div>
            </div>

            <p class="slogan" id="user-slogan">"心如止水，波澜不惊。"</p>

            <div class="nav-container">
                <a href="#" class="nav-link">关于我</a>
                <a href="#" class="nav-link">随笔</a>
                <a href="#" class="nav-link">相册</a>
            </div>
        </div>
    </div>

    <!-- 提示语，告知用户可以滑动屏幕 -->
    <div class="hint-text">Move your mouse / Touch screen</div>

    <!-- AquaInkGL 水墨流体引擎（原版脚本，必须在 body 末尾） -->
    <script src="./assets/script.js"></script>

</body>

</html>
