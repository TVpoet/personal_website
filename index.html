<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小宝贝，每天开心！</title>
    <style>
        /* 引入好看的中文字体 */
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 浪漫的渐变背景 */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Ma Shan Zheng', cursive;
            /* 书法字体 */
            cursor: pointer;
        }

        #fdaf .center-text {
            font-size: 6rem;
            color: #d1005b;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8), 0 0 20px #ffb3c6;
            z-index: 10;
            animation: pulse 2s infinite ease-in-out;
            padding: 20px;
            user-select: none;
        }

        /* 呼吸特效 */
        @keyframes pulse {
            0% {
                transform: scale(1);
                text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8), 0 0 20px #ffb3c6;
            }

            50% {
                transform: scale(1.05);
                text-shadow: 2px 2px 20px rgba(255, 255, 255, 1), 0 0 40px #ff85a2;
            }

            100% {
                transform: scale(1);
                text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8), 0 0 20px #ffb3c6;
            }
        }

        /* 爱心容器 */
        .heart-container {
            position: absolute;
            bottom: -50px;
            animation: float linear infinite;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* 画一个CSS爱心 */
        .heart {
            width: 25px;
            height: 25px;
            background-color: #ff3366;
            transform: rotate(-45deg);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.6);
            position: relative;
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: inherit;
            border-radius: 50%;
        }

        .heart::before {
            top: -12.5px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 12.5px;
        }

        /* 爱心飘落动画 */
        @keyframes float {
            0% {
                transform: translateY(0) scale(var(--scale, 1)) rotate(var(--rot, 0deg));
                opacity: 0;
            }

            10% {
                opacity: var(--opacity, 0.8);
            }

            80% {
                opacity: var(--opacity, 0.8);
            }

            100% {
                transform: translateY(-120vh) scale(var(--scale, 1)) rotate(var(--rot-end, 45deg));
                opacity: 0;
            }
        }

        /* 鼠标轨迹专属动画 */
        .heart-container.trail {
            animation: trail 1s ease-out forwards;
            bottom: auto;
            /* 取消底部定位 */
            z-index: 2;
            /* 确保轨迹爱心在上面一层 */
        }

        @keyframes trail {
            0% {
                transform: translateY(0) scale(var(--scale, 1)) rotate(var(--rot, 0deg));
                opacity: 0.8;
            }

            100% {
                transform: translateY(-80px) scale(0.2) rotate(var(--rot-end, 45deg));
                opacity: 0;
            }
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .center-text {
                font-size: 3.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- 核心文案 -->
    <div class="center-text" id="text">祝小宝贝每天开心</div>

    <script>
        const colors = ["#ff3366", "#ff4757", "#e84393", "#fd79a8", "#ff9ff3"];

        function createHeart(clientX, clientY) {
            const container = document.createElement("div");
            container.classList.add("heart-container");

            const heart = document.createElement("div");
            heart.classList.add("heart");
            container.appendChild(heart);

            // 如果有传入坐标，则在指定位置生成；否则随机生成在底部
            if (clientX !== undefined && clientY !== undefined) {
                container.style.left = clientX + "px";
                container.style.bottom = (window.innerHeight - clientY) + "px";
            } else {
                container.style.left = Math.random() * 100 + "vw";
            }

            // 随机动画时长 4s - 8s
            const duration = Math.random() * 4 + 4;
            container.style.animationDuration = duration + "s";

            // 随机大小和透明度
            const scale = Math.random() * 1.2 + 0.4;
            container.style.setProperty('--scale', scale);
            const opacity = Math.random() * 0.5 + 0.4;
            container.style.setProperty('--opacity', opacity);

            // 随机旋转扰动，增加自然飘落感
            const rot = (Math.random() * 60 - 30) + "deg";
            const rotEnd = (Math.random() * 180 - 90) + "deg";
            container.style.setProperty('--rot', rot);
            container.style.setProperty('--rot-end', rotEnd);

            // 随机颜色
            heart.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

            document.body.appendChild(container);

            // 动画结束后移除元素，防止 DOM 元素过多卡顿
            setTimeout(() => {
                container.remove();
            }, duration * 1000);
        }

        // 初始爆发一波爱心
        for (let i = 0; i < 30; i++) {
            setTimeout(createHeart, Math.random() * 2000);
        }

        // 持续不断地在底部生成爱心
        setInterval(createHeart, 250);

        // 创建轨迹专属小爱心，紧跟着鼠标
        function createTrailHeart(clientX, clientY) {
            const container = document.createElement("div");
            container.classList.add("heart-container", "trail");

            const heart = document.createElement("div");
            heart.classList.add("heart");
            container.appendChild(heart);

            // 将爱心中心对准鼠标位置
            container.style.left = (clientX - 12) + "px";
            container.style.top = (clientY - 12) + "px";

            const scale = Math.random() * 0.5 + 0.3;
            container.style.setProperty('--scale', scale);

            const rot = (Math.random() * 60 - 30) + "deg";
            const rotEnd = (Math.random() * 180 - 90) + "deg";
            container.style.setProperty('--rot', rot);
            container.style.setProperty('--rot-end', rotEnd);

            heart.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(container);

            setTimeout(() => {
                container.remove();
            }, 1000); // 轨迹爱心1秒后消失
        }

        let lastTrailTime = 0;

        // 鼠标滑动时连续产生爱心轨迹
        document.addEventListener("mousemove", (e) => {
            const now = Date.now();
            if (now - lastTrailTime > 40) { // 降低间隔时间，让爱心紧密跟随但不卡顿
                createTrailHeart(e.clientX, e.clientY);
                lastTrailTime = now;
            }
        });

        // 手机端触摸滑动时产生爱心轨迹
        document.addEventListener("touchmove", (e) => {
            const now = Date.now();
            if (now - lastTrailTime > 40 && e.touches.length > 0) {
                createTrailHeart(e.touches[0].clientX, e.touches[0].clientY);
                lastTrailTime = now;
            }
        });

        // 点击文字时增加一次特效
        document.getElementById("text").addEventListener("click", () => {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    createHeart(
                        window.innerWidth / 2 + (Math.random() * 200 - 100),
                        window.innerHeight / 2 + (Math.random() * 100 - 50)
                    );
                }, Math.random() * 500);
            }
        });
    </script>
</body>

</html>
